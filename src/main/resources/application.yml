spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: streaming
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  graphql:
    path: /graphql
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:false}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9090

app:
  name: OTT Streaming Backend
  environment: ${APP_ENV:local}

security:
  jwt:
    issuer: ${JWT_ISSUER:ott-streaming}
    secret: ${JWT_SECRET:change-me-before-auth}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT1H}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/streaming}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

---
spring:
  config:
    activate:
      on-profile: test
