spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: streaming
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  graphql:
    path: /graphql
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:false}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  name: OTT Streaming Backend
  environment: ${APP_ENV:local}
  graphql:
    max-query-depth: ${GRAPHQL_MAX_QUERY_DEPTH:8}
    log-requests: ${GRAPHQL_LOG_REQUESTS:true}
  playback:
    base-url: ${PLAYBACK_BASE_URL:https://stream.ott.local/playback}
    session-ttl: ${PLAYBACK_SESSION_TTL:PT15M}
    completion-threshold: ${PLAYBACK_COMPLETION_THRESHOLD:0.95}

security:
  jwt:
    issuer: ${JWT_ISSUER:ott-streaming}
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWJlZm9yZS1hdXRoLWNoYW5nZS1tZS1iZWZvcmUtYXV0aA==}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT1H}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/streaming}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

---
spring:
  config:
    activate:
      on-profile: test
